<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shashort - Dashboard</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #6a11cb, #2575fc);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.container{
  background: rgba(0,0,0,0.7);
  padding:40px;
  border-radius:16px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  width:400px;
  text-align:center;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

p{
  font-size:20px;
  margin:10px 0;
}

button{
  padding:12px 30px;
  background:#2ecc71;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  color:white;
}
</style>
</head>
<body>

<div class="container">
  <h1>Hello, <span id="usernameDisplay">User</span></h1>
  <p>Balance: $<span id="balanceDisplay">0</span></p>
  <button onclick="refreshBalance()">Update Balance</button>
</div>

<script src="storage.js"></script>
<script>
// استدعاء المستخدم الحالي من LocalStorage
let currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

// Redirect لو مفيش مستخدم مسجل
if(!currentUser.username){
  window.location.href = "signin.html";
}

document.getElementById('usernameDisplay').innerText = currentUser.username;
document.getElementById('balanceDisplay').innerText = currentUser.balance;

// دالة لتحديث الرصيد من storage.js
function refreshBalance(){
  const updatedUser = Storage.findUserByUsername(currentUser.username);
  if(updatedUser){
    currentUser = updatedUser;
    document.getElementById('balanceDisplay').innerText = currentUser.balance;
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
  }
}
</script>

</body>
</html>
