<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shashort - Dashboard</title>
<style>
body{ font-family: Arial; background:#f0f2f5; display:flex; justify-content:center; padding-top:30px; }
.container{ background:white; padding:30px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.2); width:550px; text-align:center;}
h1,h2{ margin:10px 0; }
button{ padding:10px 20px; margin:5px; border:none; border-radius:6px; background:#3498db; color:white; cursor:pointer; }
input{ width:90%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #ccc; }
.linkList p{ background: rgba(0,0,0,0.05); padding:6px; border-radius:4px; margin:4px 0; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
  <h1>Hello, <span id="usernameDisplay"></span></h1>
  <h2>Balance: $<span id="balanceDisplay">0</span></h2>

  <h3>Create Short Link</h3>
  <input type="text" id="urlInput" placeholder="Enter full URL (e.g., https://tiktok.com)">
  <input type="text" id="alainsInput" placeholder="Alains (e.g., xeno)">
  <button onclick="createLink()">Create Link</button>

  <div class="linkList" id="userLinks"></div>
</div>

<script src="storage.js"></script>
<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
if(!currentUser.username){
  alert("Login required");
  window.location.href="signin.html";
}
document.getElementById('usernameDisplay').innerText = currentUser.username;
document.getElementById('balanceDisplay').innerText = currentUser.balance || 0;

// إنشاء رابط مختصر
function createLink(){
  let url = document.getElementById('urlInput').value.trim();
  let alains = document.getElementById('alainsInput').value.trim();
  if(!url || !alains) return alert("Enter both URL and Alains!");

  let shortLink = "linkflow.html?alains="+encodeURIComponent(alains)+"&destination="+encodeURIComponent(url);

  if(!currentUser.links) currentUser.links=[];
  currentUser.links.push({shortLink, original:url, alains});

  Storage.updateUser(currentUser);
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  renderLinks();
}

// عرض الروابط
function renderLinks(){
  const container = document.getElementById('userLinks');
  container.innerHTML = "<h4>Your Links:</h4>";
  (currentUser.links||[]).forEach((l,index)=>{
    let p = document.createElement("p");
    p.innerText = l.alains + " → " + l.original;
    p.onclick = ()=>{
      localStorage.setItem("destinationUrl", l.original);
      window.open(l.shortLink,"_blank");
    };
    container.appendChild(p);
  });
}

renderLinks();
</script>
</body>
</html>
