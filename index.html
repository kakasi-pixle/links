<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إشارات الذهب والنفط مع تنبيه</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
  #signal { font-size: 40px; margin-top: 20px; }
  #price { font-size: 20px; margin-top: 10px; }
</style>
</head>
<body>

<h1>إشارات الذهب والنفط اللحظية مع تنبيه</h1>

<select id="asset">
  <option value="GOLD">الذهب</option>
  <option value="OIL">النفط</option>
</select>

<select id="timeframe">
  <option value="10">10 ثواني</option>
  <option value="300">5 دقائق</option>
  <option value="600">10 دقائق</option>
</select>

<br><br>
<button onclick="updateSignal()">بدء التحديث</button>

<div id="price">-</div>
<div id="signal">-</div>

<audio id="alertSound">
  <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" type="audio/mpeg">
</audio>

<script>
let priceHistory = { GOLD: [], OIL: [] };
let lastSignal = { GOLD: "", OIL: "" };

// حساب EMA
function EMA(prices, period) {
    if(prices.length < period) return null;
    let k = 2 / (period + 1);
    let ema = prices[0];
    for(let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

// جلب سعر الذهب (Gold-API بدون مفتاح)
async function fetchGold() {
    try {
        const res = await fetch("https://www.goldapi.io/api/XAU/USD");
        const data = await res.json();
        return parseFloat(data.price);
    } catch(e) {
        console.error("خطأ في جلب الذهب:", e);
        return null;
    }
}

// جلب سعر النفط (عشوائي لحظي)
async function fetchOil() {
    return parseFloat((70 + Math.random()*5).toFixed(2));
}

// تحديد الإشارة EMA
function determineSignal(asset, currentPrice) {
    let history = priceHistory[asset];
    history.push(currentPrice);
    if(history.length > 20) history.shift();
    
    let ema10 = EMA(history.slice(-10), 10);
    let ema20 = EMA(history, 20);
    if(ema10 === null || ema20 === null) return "⬆️ اطلع (UP)";

    return ema10 > ema20 ? "⬆️ اطلع (UP)" : "⬇️ انزل (DOWN)";
}

// تحديث الإشارة مع تنبيه
async function updateSignal() {
    const asset = document.getElementById('asset').value;
    const timeframe = parseInt(document.getElementById('timeframe').value) * 1000;
    
    let price = asset === "GOLD" ? await fetchGold() : await fetchOil();
    if(price !== null) {
        document.getElementById('price').innerHTML = asset + " السعر: " + price.toFixed(2);
        let signal = determineSignal(asset, price);
        document.getElementById('signal').innerHTML = signal;

        // تشغيل الصوت إذا الإشارة تغيرت
        if(signal !== lastSignal[asset]) {
            document.getElementById('alertSound').play();
            lastSignal[asset] = signal;
        }
    }
    
    setTimeout(updateSignal, timeframe);
}
</script>

</body>
</html>
