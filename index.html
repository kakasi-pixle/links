<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawarma Shorter - Ads Grid</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; margin: 20px; }
  .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px; }
  .ad-slot { width: 100%; height: 160px; background: #f2f2f2; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
  .short-link { text-align: center; margin: 40px 0; }
  .short-link button { padding: 15px 30px; background: #ff5722; color: #fff; border: none; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>

<h2>Banner Ads Grid</h2>
<div class="ads-grid" id="ads-grid">
  <div class="ad-slot" id="ad-1"></div>
  <div class="ad-slot" id="ad-2"></div>
  <div class="ad-slot" id="ad-3"></div>
  <div class="ad-slot" id="ad-4"></div>
  <div class="ad-slot" id="ad-5"></div>
  <div class="ad-slot" id="ad-6"></div>
  <div class="ad-slot" id="ad-7"></div>
  <div class="ad-slot" id="ad-8"></div>
  <div class="ad-slot" id="ad-9"></div>
  <div class="ad-slot" id="ad-10"></div>
</div>

<div class="short-link">
  <button id="short-link-btn">Go to Short Link</button>
</div>

<script>
  const adSlots = [
    'ad-1','ad-2','ad-3','ad-4','ad-5',
    'ad-6','ad-7','ad-8','ad-9','ad-10'
  ];

  function loadAd(adId){
    const el = document.getElementById(adId);
    if(!el) return;

    const atScript = document.createElement('script');
    atScript.innerHTML = `
      atOptions = {
        'key' : '1b6d063030f9a97f69978bbeabea752e',
        'format' : 'iframe',
        'height' : 300,
        'width' : 160,
        'params' : {}
      };`;
    el.appendChild(atScript);

    const invokeScript = document.createElement('script');
    invokeScript.src = 'https://www.highperformanceformat.com/1b6d063030f9a97f69978bbeabea752e/invoke.js';
    el.appendChild(invokeScript);
  }

  adSlots.forEach(loadAd);

  document.getElementById('short-link-btn').addEventListener('click', function(){
    alert('Redirect will start in 10 seconds.');
    setTimeout(() => {
      window.location.href = 'https://example.com/your-short-link';
    }, 10000);
  });
</script>

</body>
</html>
