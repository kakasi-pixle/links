<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>GOLD SIGNAL 10s</title>

<style>
body{
 background:black;
 color:white;
 text-align:center;
 font-family:Arial;
}

#signal{
 font-size:70px;
 margin-top:50px;
}

#price{
 font-size:25px;
 margin:20px;
}

.up{color:#00ff00;}
.down{color:#ff0000;}
</style>
</head>

<body>

<h2>📊 GOLD SIGNAL (10s)</h2>

<div id="price">...</div>
<div id="signal">...</div>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>

let history=[];

// EMA
function EMA(data, p){
 if(data.length<p) return null;
 let k=2/(p+1), ema=data[0];
 for(let i=1;i<data.length;i++){
  ema=data[i]*k + ema*(1-k);
 }
 return ema;
}

// RSI
function RSI(data,p=14){
 if(data.length<p) return null;
 let g=0,l=0;
 for(let i=1;i<p;i++){
  let d=data[i]-data[i-1];
  if(d>0) g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// Momentum
function momentum(data){
 if(data.length<2) return 0;
 return data[data.length-1] - data[data.length-2];
}

// مصدرين بدون مفتاح
async function getPrice1(){
 try{
  let r=await fetch("https://api.metals.live/v1/spot");
  let d=await r.json();
  return d[0].gold;
 }catch{return null;}
}

async function getPrice2(){
 try{
  let r=await fetch("https://api.gold-api.com/v1/latest/XAU/USD");
  let d=await r.json();
  return d.price;
 }catch{return null;}
}

// تحليل
function analyze(price){
 history.push(price);
 if(history.length>50) history.shift();

 let ema10=EMA(history.slice(-10),10);
 let ema20=EMA(history.slice(-20),20);
 let rsi=RSI(history);
 let mom=momentum(history);

 if(!ema10||!ema20||!rsi) return "UP";

 let score=0;

 if(ema10>ema20) score++;
 else score--;

 if(rsi<70) score++;
 else score--;

 if(mom>0) score++;
 else score--;

 return score>=1?"UP":"DOWN";
}

let lastSignal="";

async function update(){
 let p1=await getPrice1();
 let p2=await getPrice2();

 let price = (p1 && p2) ? (p1+p2)/2 : (p1||p2);

 if(!price) return;

 document.getElementById("price").innerHTML = "السعر: "+price.toFixed(2);

 let signal = analyze(price);

 let text = signal=="UP"?
 '<span class="up">⬆️ ارفع</span>' :
 '<span class="down">⬇️ انزل</span>';

 document.getElementById("signal").innerHTML = text;

 if(signal!==lastSignal){
  document.getElementById("sound").play();
  lastSignal=signal;
 }

 setTimeout(update,10000);
}

update();

</script>

</body>
</html>
