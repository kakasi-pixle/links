<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shashort - Sign Up</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  width:400px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:12px 40px;
  background:#2ecc71;
  border:none;
  border-radius:6px;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.notice{
  background:#f9edbe;
  padding:10px;
  border-radius:6px;
  margin-bottom:15px;
  font-size:14px;
  color:#856404;
}
</style>
</head>
<body>

<div class="container">
  <h1>Create Your Account</h1>
  <div class="notice">
    المنصة تستعمل: Vodafone Cash, Orange Cash, WePay, InstaPay فقط
  </div>

  <input type="text" id="username" placeholder="Username" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="text" id="phone" placeholder="Phone" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
  <button onclick="createAccount()">Create Account</button>

  <p>Already have an account? <a href="signin.html">Login</a></p>
</div>

<script src="storage.js"></script>
<script>
function createAccount(){
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if(!username || !email || !phone || !password || !confirmPassword){
    alert("Complete all fields!");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match!");
    return;
  }

  if(Storage.findUserByUsername(username)){
    alert("Username already taken!");
    return;
  }

  if(Storage.findUserByEmail(email)){
    alert("Email already used!");
    return;
  }

  if(Storage.findUserByPhone(phone)){
    alert("Phone already used!");
    return;
  }

  const user = {
    username,
    email,
    phone,
    pass: password,
    role: "user",
    balance:0,
    links:[]
  };

  Storage.saveUser(user);
  alert("Account created successfully!");
  window.location.href = "signin.html";
}
</script>

</body>
</html>
