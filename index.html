<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إشارات الذهب والنفط اللحظية</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
  #signal { font-size: 30px; margin-top: 20px; }
  #price { font-size: 20px; margin-top: 10px; }
</style>
</head>
<body>

<h1>إشارات الذهب والنفط اللحظية</h1>

<select id="asset">
  <option value="GOLD">الذهب</option>
  <option value="OIL">النفط</option>
</select>

<select id="timeframe">
  <option value="10">10 ثواني</option>
  <option value="300">5 دقائق</option>
  <option value="600">10 دقائق</option>
</select>

<br><br>
<button onclick="updateSignal()">عرض الإشارة</button>

<div id="price">-</div>
<div id="signal">-</div>

<script>
let lastPrice = { GOLD: null, OIL: null };

// دالة لجلب سعر الذهب من Gold‑API (بدون مفتاح)
async function fetchGold() {
    try {
        const res = await fetch("https://www.goldapi.io/api/XAU/USD");
        const data = await res.json();
        return parseFloat(data.price);
    } catch(e) {
        console.error("خطأ في جلب الذهب:", e);
        return null;
    }
}

// دالة لجلب سعر النفط (نجرب Pineify أو بيانات وهمية مجانية)
async function fetchOil() {
    try {
        // هنا مثال سعر عشوائي بدل API لحظي مجاني مباشر
        return parseFloat((70 + Math.random()*5).toFixed(2));
    } catch(e) {
        console.error("خطأ في جلب النفط:", e);
        return null;
    }
}

// تحديد الإشارة Up/Down
function determineSignal(asset, currentPrice) {
    if (lastPrice[asset] === null) {
        lastPrice[asset] = currentPrice;
        return "🟡 امسك (HOLD)";
    }
    let signal = currentPrice > lastPrice[asset] ? "⬆️ اطلع (UP)" :
                 currentPrice < lastPrice[asset] ? "⬇️ انزل (DOWN)" : "🟡 امسك (HOLD)";
    lastPrice[asset] = currentPrice;
    return signal;
}

// تحديث الإشارة على الصفحة
async function updateSignal() {
    const asset = document.getElementById('asset').value;
    const timeframe = parseInt(document.getElementById('timeframe').value) * 1000;
    
    let price = asset === "GOLD" ? await fetchGold() : await fetchOil();
    if(price !== null) {
        document.getElementById('price').innerHTML = asset + " السعر: " + price;
        document.getElementById('signal').innerHTML = determineSignal(asset, price);
    }
    
    // إعادة التحديث تلقائي حسب الوقت المحدد
    setTimeout(updateSignal, timeframe);
}

// تشغيل التحديث تلقائي عند الضغط على الزر
</script>

</body>
</html>
