<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow Page</title>
<style>
body{ font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0;}
.container{ background:white; padding:30px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.2); width:600px; text-align:center; }
h1{ margin-bottom:15px; }
img{ width:80px; height:80px; margin:5px; }
button{ padding:10px 20px; margin:10px; cursor:pointer; background:#3498db; color:white; border:none; border-radius:6px; }
#adsTop, #adsBottom{ display:flex; justify-content:center; flex-wrap:wrap; margin:10px 0;}
</style>
</head>
<body>
<div class="container">
  <h1>Flow Page</h1>

  <div id="adsTop"></div>

  <button onclick="openSmartLink()">Smart Link</button>
  <button onclick="openPopUnder()">Pop-under</button>

  <div id="adsBottom"></div>
</div>

<script>
// روابط صور HTTPS ثابتة
let topImages = [
  "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Shaki_waterfall.jpg/120px-Shaki_waterfall.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Wikipedia-logo-v2-en.svg/120px-Wikipedia-logo-v2-en.svg.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/June_odd-eyed-cat.jpg/120px-June_odd-eyed-cat.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/120px-PNG_transparency_demonstration_1.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wikipedia-logo-en-big.png/120px-Wikipedia-logo-en-big.png"
];

let bottomImages = [
  "https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Google_Images_2015_logo.svg/120px-Google_Images_2015_logo.svg.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Wikipedia-logo.png/120px-Wikipedia-logo.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Example_image.png/120px-Example_image.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Blue_PNG_example.png/120px-Blue_PNG_example.png",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Example.jpg/120px-Example.jpg"
];

let adsTop = document.getElementById("adsTop");
let adsBottom = document.getElementById("adsBottom");

topImages.forEach(src=>{
  let img=document.createElement("img");
  img.src=src;
  adsTop.appendChild(img);
});
bottomImages.forEach(src=>{
  let img=document.createElement("img");
  img.src=src;
  adsBottom.appendChild(img);
});

// الروابط
let smartLink = "https://www.effectivegatecpm.com/abue3ptame?key=6d93c92516e484a867b73322e5d9db48";
let popUnderLink = "https://www.effectivegatecpm.com/abue3ptame?key=6d93c92516e484a867b73322e5d9db48";

function openSmartLink(){
  window.open(smartLink,"_blank");
  alert("Smart Link clicked!");
}

function openPopUnder(){
  window.open(popUnderLink,"_blank");
  alert("Pop-under clicked!");
}
</script>
</body>
</html>
