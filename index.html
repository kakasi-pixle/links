<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Shashort - Sign Up</title>
<style>
body{
  font-family: Arial;
  background: #f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
  width:400px;
  text-align:center;
}
h1{ margin-bottom:20px; }
input{
  width:80%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}
button{
  padding:10px 30px;
  background:#2ecc71;
  border:none;
  border-radius:6px;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
.notice{
  background:#f9edbe;
  padding:10px;
  border-radius:6px;
  margin-bottom:15px;
  font-size:14px;
  color:#856404;
}
</style>
</head>
<body>

<div class="container">
  <h1>Shashort - Sign Up</h1>
  <div class="notice">
    المنصة تستعمل: Vodafone Cash, Orange Cash, WePay, InstaPay فقط
  </div>

  <input type="text" id="signupName" placeholder="اسمك الكامل" required>
  <input type="text" id="signupWhatsapp" placeholder="رقم واتساب" required>
  <input type="password" id="signupPass" placeholder="كلمة المرور" required>
  <button onclick="signup()">Sign Up</button>
  <p>لديك حساب؟ <a href="signin.html">Login</a></p>
</div>

<script src="storage.js"></script>
<script>
function signup(){
  const name = document.getElementById('signupName').value;
  const whatsapp = document.getElementById('signupWhatsapp').value;
  const pass = document.getElementById('signupPass').value;

  if(!name || !whatsapp || !pass){
    alert("اكمل كل البيانات!");
    return;
  }

  if(Storage.findUser(whatsapp)){
    alert("رقم الواتساب مستخدم من قبل!");
    return;
  }

  Storage.saveUser({phone:whatsapp, name:name, pass:pass, role:"user", balance:0, links:[]});
  alert("تم التسجيل بنجاح!");
  window.location.href = "signin.html";
}
</script>

</body>
</html>
