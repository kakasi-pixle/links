<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI GOLD 10s</title>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
#signal{font-size:70px;margin-top:50px;}
#info{font-size:20px;margin-top:20px;}
.up{color:#00ff00;}
.down{color:#ff0000;}
</style>
</head>

<body>

<h2>🤖 AI GOLD SIGNAL</h2>

<div id="signal">...</div>
<div id="info"></div>

<script>

let prices=[];

// EMA
function EMA(data,p){
 if(data.length<p) return null;
 let k=2/(p+1), ema=data[0];
 for(let i=1;i<data.length;i++){
  ema=data[i]*k + ema*(1-k);
 }
 return ema;
}

// RSI
function RSI(data,p=14){
 if(data.length<p) return null;
 let g=0,l=0;
 for(let i=1;i<p;i++){
  let d=data[i]-data[i-1];
  if(d>0) g+=d; else l-=d;
 }
 let rs=g/(l||1);
 return 100-(100/(1+rs));
}

// Momentum
function MOM(data){
 if(data.length<2) return 0;
 return data[data.length-1]-data[data.length-2];
}

// مصدر حقيقي بدون مفتاح
async function getPrice(){
 try{
  let r=await fetch("https://api.metals.live/v1/spot");
  let d=await r.json();
  return d[0].gold;
 }catch{return null;}
}

// AI Logic
function AI(price){
 prices.push(price);
 if(prices.length>50) prices.shift();

 let ema10=EMA(prices.slice(-10),10);
 let ema20=EMA(prices.slice(-20),20);
 let rsi=RSI(prices);
 let mom=MOM(prices);

 if(!ema10||!ema20||!rsi) return "UP";

 let score=0;

 // اتجاه
 if(ema10>ema20) score+=2;
 else score-=2;

 // قوة
 if(rsi<30) score+=2;
 else if(rsi>70) score-=2;

 // حركة
 if(mom>0) score+=1;
 else score-=1;

 // فلتر ذكي
 let trend = prices[prices.length-1] > prices[0];

 if(trend) score+=1;
 else score-=1;

 return score>=1?"UP":"DOWN";
}

async function run(){
 let price=await getPrice();
 if(!price) return;

 let result=AI(price);

 let text = result=="UP"?
 '<span class="up">⬆️ ارفع</span>' :
 '<span class="down">⬇️ انزل</span>';

 document.getElementById("signal").innerHTML=text;
 document.getElementById("info").innerHTML=
 "السعر: "+price.toFixed(2);

 setTimeout(run,10000);
}

run();

</script>

</body>
</html>
