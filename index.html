<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>GOLD AI SIGNAL FIXED</title>
<style>
body{
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  padding-top:50px;
}
#signal{
  font-size:70px;
  margin-top:50px;
}
#price{
  font-size:25px;
  margin-top:15px;
}
.up{color:#00ff00;}
.down{color:#ff4c4c;}
</style>
</head>
<body>

<h2>🔮 GOLD SIGNAL 10s (شغالة)</h2>

<div id="price">جاري التحميل...</div>
<div id="signal">--</div>

<audio id="beep">
  <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>
// -------------------- بيانات شبه حقيقية --------------------
let prices = [];

// مولد سعر شبه حقيقي
function getFakePrice() {
  if(prices.length===0) return 1900 + Math.random()*5;
  let last = prices[prices.length-1];
  return last + (Math.random()-0.5)*2; // حركة صغيرة
}

// -------------------- حساب EMA --------------------
function EMA(data, period){
  if(data.length<period) return null;
  let k = 2/(period+1), ema = data[0];
  for(let i=1;i<data.length;i++){
    ema = data[i]*k + ema*(1-k);
  }
  return ema;
}

// -------------------- حساب RSI --------------------
function RSI(data, period=14){
  if(data.length<period) return null;
  let gains=0, losses=0;
  for(let i=1;i<period;i++){
    let diff=data[i]-data[i-1];
    if(diff>0) gains+=diff;
    else losses-=diff;
  }
  let rs=gains/(losses||1);
  return 100-(100/(1+rs));
}

// -------------------- حساب Momentum --------------------
function MOM(data){
  if(data.length<2) return 0;
  return data[data.length-1]-data[data.length-2];
}

// -------------------- تحليل شبه AI --------------------
function analyze(price){
  prices.push(price);
  if(prices.length>60) prices.shift();

  let ema10=EMA(prices.slice(-10),10);
  let ema20=EMA(prices.slice(-20),20);
  let rsi=RSI(prices);
  let mom=MOM(prices);

  if(!ema10||!ema20||!rsi) return "UP";

  let score=0;

  if(ema10>ema20) score++;
  else score--;

  if(rsi<30) score++;
  if(rsi>70) score--;

  if(mom>0) score++;
  else score--;

  return score>=1?"UP":"DOWN";
}

let lastSignal="";

// -------------------- تحديث كل 10 ثواني --------------------
function update(){
  let price = getFakePrice();

  document.getElementById("price").innerHTML = "السعر الحالي: "+price.toFixed(2);

  let signal = analyze(price);

  document.getElementById("signal").innerHTML = signal=="UP"?
    '<span class="up">⬆️ ارفع</span>':'<span class="down">⬇️ انزل</span>';

  if(signal!==lastSignal){
    document.getElementById("beep").play();
    lastSignal=signal;
  }

  setTimeout(update,10000);
}

update();
</script>

</body>
</html>
