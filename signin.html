<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shashort - Sign In</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  width:400px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:12px 40px;
  background:#3498db;
  border:none;
  border-radius:6px;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Sign In</h1>

  <input type="text" id="userInput" placeholder="Username / Email / Phone" required>
  <input type="password" id="password" placeholder="Password" required>
  <button onclick="login()">Sign In</button>
  <p>Don't have an account? <a href="index.html">Sign Up</a></p>
</div>

<script src="storage.js"></script>
<script>
function login(){
  const input = document.getElementById('userInput').value.trim();
  const pass = document.getElementById('password').value;

  if(!input || !pass){
    alert("Please complete all fields!");
    return;
  }

  const user = Storage.getUsers().find(u => 
    (u.username === input || u.email === input || u.phone === input) && u.pass === pass
  );

  if(!user){
    alert("Incorrect credentials!");
    return;
  }

  alert("Logged in successfully!");
}
</script>

</body>
</html>
